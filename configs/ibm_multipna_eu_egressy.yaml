# T5 — репродукция под протоколом Egressy (внешняя сопоставимость с литературой).
# Тот же сильный режим, что L6 (Multi-PNA+EU), но временной сплит выровнен на
# 60/20/20 (val_fraction=0.2 → train 60 / val 20 / test 20) вместо нашего 65/15/20.
# Цель: заявить «воспроизводим литературный режим» и явно отчитать дельту
# протоколов. Перед финальным прогоном сверить fanout/lr/depth с
# github.com/IBM/Multi-GNN (Appendix F) и при расхождении подогнать (A100 потянет).
seed: 42
device: cuda

dataset:
  include_time: false
  name: ibm_aml
  root: data/ibm_aml
  variant: HI-Small
  test_fraction: 0.2
  val_fraction: 0.2     # → 60/20/20 (Egressy), вместо дефолтного 0.15 (65/15/20)
  # max_rows: 500000

model:
  type: pna
  params:
    hidden: 64
    num_layers: 3
    dropout: 0.2
    reverse_mp: true
    ports: true
    ego_ids: true
    edge_updates: true

train:
  full_data: true
  pos_weight: 100
  num_neighbors: [50, 50, 50]
  batch_size: 4096
  neg_ratio: 20
  val_neg_cap: 50000
  epochs: 60
  patience: 10
  lr: 0.003
  weight_decay: 0.0005

output_dir: results
output_name: ibm_multipna_eu_egressy
checkpoint_dir: checkpoints
save_checkpoint: true

wandb:
  enabled: false
  project: gnn-aml
  entity: null
