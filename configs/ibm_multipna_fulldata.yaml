# L5 — Multi-PNA БЕЗ edge-updates: PNA + полный стек (reverse+port+ego).
# Изолирует вклад EU: L6 = L5 + edge_updates. Протокол идентичен L3–L6.
seed: 42
device: cuda

dataset:
  include_time: false
  name: ibm_aml
  root: data/ibm_aml
  variant: HI-Small
  # max_rows: 500000

model:
  type: pna
  params:
    hidden: 64
    num_layers: 3
    dropout: 0.2
    reverse_mp: true
    ports: true
    ego_ids: true
    edge_updates: false   # отличие от L6

train:
  full_data: true
  pos_weight: 100
  num_neighbors: [50, 50, 50]
  batch_size: 4096
  neg_ratio: 20
  val_neg_cap: 50000
  epochs: 60
  patience: 10
  lr: 0.003
  weight_decay: 0.0005

output_dir: results
output_name: ibm_multipna_fulldata
checkpoint_dir: checkpoints
save_checkpoint: true

wandb:
  enabled: false
  project: gnn-aml
  entity: null
