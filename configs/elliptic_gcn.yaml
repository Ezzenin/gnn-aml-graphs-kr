# GNN-линейка на Elliptic: GCN. Тот же временно́й сплит и метрики, что у бейзлайна.
seed: 42
device: cpu              # cpu | mps | cuda

dataset:
  name: elliptic
  root: data/elliptic

model:
  type: gcn
  params:
    hidden_channels: 64
    dropout: 0.5

train:
  epochs: 200
  lr: 0.01
  weight_decay: 0.0005
  patience: 20

val_fraction: 0.2
output_dir: results
output_name: elliptic_gcn

wandb:
  enabled: false
  project: gnn-aml
  entity: null
